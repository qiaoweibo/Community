/*下面为js的代码部分*/
/*先查询到queryText中的内容，然后再把它解析出来*/
function search() {
	var queryText=$("#queryText").val();
	$.ajax({
		cache : true,
		type : "POST",
		url : "/search",
		data : {
			"queryText": queryText
		},
		async : false,

			success : function(data) {
			console.log(data)
			/*$("#对应前面设置的id").append(data)*/
				var result="";
				for( var i=0;i<data.queryText.length;i++){
					var pan="";
					if(data.queryText[i].noticeType==1)
					{
						pan="通告"
					}
					else{
						pan="公告"
					}
					result=result+"<tr id=\"bold\" bordercolor=\"add8e6\" bgcolor=\"#add8e6\">\n" +
							"<td >"+data.queryText[i].noticeTitle+"</td>\n" +
							"<td >"+pan+"</td>\n" +
							"<td >"+data.queryText[i].createBy+"</td>\n" +
							"<td >"+data.queryText[i].createTime+"</td>\n" +
							"<td class=\"client-status\"><a href=\"/article?id="+data.queryText[i].noticeId+"\"><span class=\"label label-primary\">查看详情</span></a></td>\n" +
							"</tr>"
				}
					$("#searchId").empty();
			$("#searchId").append(result)
		}
	});

}
		</script>
