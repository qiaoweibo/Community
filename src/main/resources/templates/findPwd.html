<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('找回密码')" />
    <th:block th:include="include :: layout-latest-css" />
    <th:block th:include="include :: ztree-css" />
</head>
<body style="margin-bottom: 60px;">
<input th:if="${session.userid}" hidden="hidden" id="userId" th:value="${session.userid}">
<div class="content" style="margin-top: 100px;">
    <!--    <input type="button" data="emmailCode" value="获取验证码">-->
    <div class="panel panel-success col-sm-8 col-sm-offset-2" style="padding: 0;">
        <div class="panel-heading">
            <h4 style="text-align: center;"> 找回密码</h4>
        </div>
        <div class="panel-body">
            <form class="form-horizontal" role="form">
                <div class="form-group">
                    <label for="email" class="col-sm-2 control-label col-sm-offset-2">邮箱</label>
                    <div class="col-sm-4">
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="请输入邮箱">
                    </div>
                </div>
                <div class="form-group">
                    <div class=" col-sm-10 col-sm-offset-4">
                        <span type="button" class="btn btn-success" onclick="findPwd()">提交</span>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
<th:block th:include="include :: footer" />
<th:block th:include="include :: layout-latest-js" />
<th:block th:include="include :: ztree-js" />
<script>
    function findPwd() {
        var email = $("#email").val();
        if (email == null || email == '') {
            $.modal.msg("请输入邮箱");
            return;
        }
        $.ajax({
            type: "post",
            url: "/findPwdBody",
            data: {"email": email},
            beforeSend: function () {
                $.modal.loading("正在提交。。");
            },
            async: true,
            success: function (r) {
                $.modal.closeLoading();
                console.log(r);
                $.modal.msg("提交成功");
                sleep(2000);
                location.href="/login"
            }
        });
    }

/*加入睡眠操作*/
    function sleep(numberMillis) {
        var now = new Date();
        var exitTime = now.getTime() + numberMillis;
        while (true) {
            now = new Date();
            if (now.getTime() > exitTime)
                return;
        }
    }

    $("input[data='emmailCode']").click(btnCheck);

    /**
     * [btnCheck 按钮倒计时常用于找回密码
     */
    function btnCheck() {
        $(this).addClass("on");
        var time = 5;
        $(this).attr("disabled", true);
        var timer = setInterval(function () {
            if (time == 0) {
                clearInterval(timer);
                $("input[data='emmailCode']").attr("disabled", false);
                $("input[data='emmailCode']").val("获取验证码");
                $("input[data='emmailCode']").removeClass("on");
            } else {
                $('input[data=\'emmailCode\']').val(time + "秒");
                time--;
            }
        }, 1000);
    }
</script>
</html>
