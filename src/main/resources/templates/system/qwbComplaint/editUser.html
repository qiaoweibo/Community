<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改投訴')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbComplaint-edit" th:object="${qwbComplaint}">
            <input id="id" name="id" th:field="*{id}"  type="hidden">
			<div class="form-group">	
				<label class="col-sm-3 control-label">投诉人：</label>
				<div class="col-sm-8">
					<input id="name" name="name" th:field="*{name}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">房间号：</label>
				<div class="col-sm-8">
					<input id="room" name="room" th:field="*{room}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">	
				<label class="col-sm-3 control-label">投诉时间：</label>
				<div class="col-sm-8">
					<input id="creationTime" name="creationTime" th:field="*{creationTime}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">投诉内容：</label>
				<div class="col-sm-8">
					<input id="content" name="content" th:field="*{content}" class="form-control" type="text">
				</div>
			</div>

			<!--<div class="form-group">
				<label class="col-sm-3 control-label">处理结果：</label>
				<div class="col-sm-8">
					<input id="remarks" name="remarks" th:field="*{remarks}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">处理时间：</label>
				<div class="col-sm-8">
					<input id="completeTime" name="completeTime" th:field="*{completeTime}" class="form-control" type="text">
				</div>
			</div>-->
			<input id="state" name="state"  type="text" hidden="hidden" value="0">
			<!--<div class="form-group">
				&lt;!&ndash;<label class="col-sm-3 control-label">状态:0.未完成，1，完成。2.无法完成：</label>&ndash;&gt;
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<input id="state" name="state" th:field="*{state}" class="form-control" type="text">
				</div>
			</div>-->
		</form>
    </div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbComplaint";
		$("#form-qwbComplaint-edit").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/edit", $('#form-qwbComplaint-edit').serialize());
	        }
	    }
	</script>
</body>
</html>
