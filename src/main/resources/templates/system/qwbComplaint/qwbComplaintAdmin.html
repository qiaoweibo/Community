<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('投訴列表')" />
</head>


<!--=================管理员的投诉管理视图============================-->
<body class="gray-bg">
     <div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="formId">
					<div class="select-list">
						<ul>
							<!--<li>
								投诉人：<input type="text" name="name"/>
							</li>

							<li>
								房间号：<input type="text" name="room"/>
							</li>-->

							<li class="select-time">
								<label>投诉时间： </label>
								<input type="text" class="time-input" id="startTime" placeholder="开始时间" name="params[beginTime]"/>
								<span>-</span>
								<input type="text" class="time-input" id="endTime" placeholder="结束时间" name="params[endTime]"/>
							</li>

							<!--<li>
								投诉时间：<input type="text" name="creationTime"/>
							</li>-->

							<!--<li>
								投诉内容：<input type="text" name="content"/>
							</li>



							<li>
								处理结果：<input type="text" name="remarks"/>
							</li>

							<li>
								处理时间：<input type="text" name="completeTime"/>
							</li>-->

							<li>
								<!--状态:0.未完成，1，完成。2.无法完成：<input type="text" name="state"/>-->
								状态：<input type="text" name="state"/>
							</li>

							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:qwbComplaint:add">
					<i class="fa fa-plus"></i> 添加
				</a>
				<a class="btn btn-primary btn-edit disabled" onclick="$.operate.edit()" shiro:hasPermission="system:qwbComplaint:edit">
					<i class="fa fa-edit"></i> 修改
				</a>
				<a class="btn btn-danger btn-del btn-del disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:qwbComplaint:remove">
					<i class="glyphicon glyphicon-trash"></i> 删除
				</a>
				<a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:qwbComplaint:export">
						<i class="fa fa-download"></i> 导出
				 </a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table" data-mobile-responsive="true"></table>
			</div>
		</div>
	</div>
    <div th:include="include :: footer"></div>
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:qwbComplaint:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:qwbComplaint:remove')}]];
        var prefix = ctx + "system/qwbComplaint";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
                modalName: "投訴",
		        showExport: true,
                columns: [{
		            checkbox: true
		        },
				{
					field : 'id', 
					title : '',
					visible: false
				},
				{
					field : 'name', 
					title : '投诉人',
					sortable: true
				},
					{
						field : 'room',
						title : '房间号',
						sortable: true
					},
				{
					field : 'creationTime', 
					title : '投诉时间',
					sortable: true
				},
				{
					field : 'content', 
					title : '投诉内容',
					sortable: true
				},

				{
					field : 'remarks', 
					title : '处理结果',
					sortable: true
				},
					{
						field : 'completeTime',
						title : '处理时间',
						sortable: true
					},
					{
						// field : 'state',
						title : '状态',
						sortable: true,
						formatter: function(value, row, index) {
							var actions = [];
							if(row.state==0)
							{
								actions.push('未处理');
							}
							else{
								actions.push('已处理');
							}

							return actions.join('');
						}
					},
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		            	var actions = [];
		            	actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="#" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>处理投诉</a> ');

                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="#" onclick="$.operate.remove(\'' + row.id + '\')"><i class="glyphicon glyphicon-trash"></i>删除</a>');

						return actions.join('');
		            }
		        }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
