<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改车位申请')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbCarApply-edit" th:object="${qwbCarApply}">
            <input id="id" name="id" th:field="*{id}"  type="hidden">
			<div class="form-group">	
				<label class="col-sm-3 control-label">申请人姓名：</label>
				<div class="col-sm-8">
					<input readonly id="name" name="name" th:field="*{name}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">房间号：</label>
				<div class="col-sm-8">
					<input readonly id="room" name="room" th:field="*{room}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">租期：</label>
				<div class="col-sm-8">
					<input  readonly id="rentTime" name="rentTime" th:field="*{rentTime}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">	
				<label class="col-sm-3 control-label">申请人的电话号码：</label>
				<div class="col-sm-8">
					<input  readonly id="phone" name="phone" th:field="*{phone}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">申请时间：</label>
				<div class="col-sm-8">
					<input  readonly id="applyTime" name="applyTime" th:field="*{applyTime}" class="form-control" type="text">
				</div>
			</div>


<!--注意此处的state是申请表里面的状态，表示的是已审核和未审核-->
			<input id="state" name="state"  type="text" hidden="hidden" value="1">
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<input id="state" name="state" th:field="*{state}" class="form-control" type="text">
				</div>
			</div>-->
			<div class="form-group">
				<label class="col-sm-3 control-label">审核人：</label>
				<div class="col-sm-8">
					<input   id="agreeName" name="agreeName" th:field="*{agreeName}" class="form-control" type="text">
				</div>
			</div>
			<!--回头加一个审核人的字段(数据库里加字段省力(记得还要加上 租期  房间号  审核人))-->
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">批准时间：</label>
				<div class="col-sm-8">
					<input id="agreeTime" name="agreeTime" th:field="*{agreeTime}" class="form-control" type="text">
				</div>
			</div>-->
			<div class="form-group">	
				<!--<label class="col-sm-3 control-label">车位id（用于关联操作）：</label>-->
				<div class="col-sm-8">
					<input id="cId"  hidden name="cId" th:field="*{cId}"  type="text">
				</div>
			</div>
		</form>
    </div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbCarList";
		$("#form-qwbCarApply-edit").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/edit", $('#form-qwbCarApply-edit').serialize());
	        }
	    }
	</script>
</body>
</html>
