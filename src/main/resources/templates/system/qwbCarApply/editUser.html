<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改车位申请')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbCarApply-edit" th:object="${qwbCarApply}">
            <input id="id" name="id" th:field="*{id}"  type="hidden">
			<div class="form-group">
			<label class="col-sm-3 control-label">申请人姓名：</label>
			<div class="col-sm-8">
				<input id="name" name="name" th:field="*{name}" class="form-control" type="text">
			</div>
		</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">房间号：</label>
				<div class="col-sm-8">
					<input id="room" name="room" th:field="*{room}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">租期：</label>
				<div class="col-sm-8">
					<input id="rentTime" name="rentTime" th:field="*{rentTime}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">	
				<label class="col-sm-3 control-label">申请人的电话号码：</label>
				<div class="col-sm-8">
					<input id="phone" name="phone" th:field="*{phone}" class="form-control" type="text">
				</div>
			</div>
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">申请时间：</label>
				<div class="col-sm-8">
					<input id="applyTime" name="applyTime" th:field="*{applyTime}" class="form-control" type="text">
				</div>
			</div>-->

			<input id="state" name="state"  type="text" hidden="hidden" value="0">
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<input id="state" name="state" th:field="*{state}" class="form-control" type="text">
				</div>
			</div>-->
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">批准时间：</label>
				<div class="col-sm-8">
					<input id="agreeTime" name="agreeTime" th:field="*{agreeTime}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">车位id（用于关联操作）：</label>
				<div class="col-sm-8">
					<input id="cId" name="cId" th:field="*{cId}" class="form-control" type="text">
				</div>
			</div>-->
		</form>
    </div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbCarApply";
		$("#form-qwbCarApply-edit").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/edit", $('#form-qwbCarApply-edit').serialize());
	        }
	    }
	</script>
</body>
</html>
