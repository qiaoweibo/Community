<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增车位申请')" />

	<!--这个页面是用户在车位列表中的“申请”按钮点击后跳转到的页面-->
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbCarApply-add">
			<div class="form-group">	
				<label class="col-sm-3 control-label">申请人姓名：</label>
				<div class="col-sm-8">
					<input id="name" name="name"   placeholder="必须要填名字，否则有惊喜" class="form-control" type="text">
				</div>
			</div>


			<div class="form-group">
				<label class="col-sm-3 control-label">房间号：</label>
				<div class="col-sm-8">
					<input id="room" name="room" class="form-control" type="text">
				</div>
			</div>


			<div class="form-group">
				<label class="col-sm-3 control-label">租期：</label>
				<div class="col-sm-8">
					<input id="rentTime" name="rentTime" class="form-control" type="text">
				</div>
			</div>


			<div class="form-group">	
				<label class="col-sm-3 control-label">申请人的电话号码：</label>
				<div class="col-sm-8">
					<input id="phone" name="phone" class="form-control" type="text">
				</div>
			</div>
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">申请时间：</label>
				<div class="col-sm-8">
					<input id="applyTime" name="applyTime" class="form-control" type="text">
				</div>
			</div>-->
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">状态：</label>
				<div class="col-sm-8">
					<input id="state" name="state" class="form-control" type="text">
				</div>
			</div>-->
<!--
			<input type="text" hidden="hidden" name="state" value="1"/>
-->
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">批准时间：</label>
				<div class="col-sm-8">
					<input id="agreeTime" name="agreeTime" class="form-control" type="text">
				</div>
			</div>-->
			<div class="form-group">
				<!--<label class="col-sm-3 control-label">车位id（用于关联操作）：[[${carId}]]</label>-->
				<div class="col-sm-8">
<!--新加了一个th:value="${carId}"，相当于从数据库中获取到车位id-->
					<!--去掉class="form-control"表示框框-->
					<input  hidden id="cId" name="cId"  type="text" th:value="${carId}">
				</div>
			</div>

<!--新添加的按钮-->
<!--此处的保存点击后会关闭全部页面-->
			<div class="form-group">
				<div class="col-sm-4 col-sm-offset-5">
					<button id="submitBtn"  type="button" class="btn btn-sm btn-primary" style="width: 200px;"
							onclick="submitHandler()"><i
							class="fa fa-check"></i>保 存
					</button>
				</div>
			</div>

		</form>
	</div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbCarApplyList"
		$("#form-qwbCarApply-add").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/add", $('#form-qwbCarApply-add').serialize());
	        }
	    }
	</script>
</body>
</html>
