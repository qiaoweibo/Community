<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增通知公告')" />
	<th:block th:include="include :: summernote-css" />

	<link th:href="@{/css/fileinput.min.css}" rel="stylesheet"/>
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">




        <form class="form-horizontal m" id="form-notice-add">
			<div class="form-group">	
				<label class="col-sm-2 control-label">公告标题：</label>
				<div class="col-sm-10">
					<input id="noticeTitle" name="noticeTitle" class="form-control" type="text" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-2 control-label">公告类型：</label>
				<div class="col-sm-10">
					<select name="noticeType" class="form-control m-b" th:with="type=${@dict.getType('sys_notice_type')}">
	                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
	                </select>
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-2 control-label">公告内容：</label>
				<div class="col-sm-10">
				    <input id="noticeContent" name="noticeContent" type="hidden">
				    <div class="summernote"></div>
				</div>
			</div>





			<!--<form id="formimg" class="form-horizontal m" method="post" enctype="multipart/form-data">
				<div class="form-group">
					<label class="col-sm-3 control-label">获奖证书：</label>
					<div class="col-sm-8">
						<input id="input-1a" type="file" name="file" class="file"
							   data-show-remove="false"
							   data-show-cancel="false"
							   data-show-preview="true">
					</div>
				</div>拖曳文件到这里
			</form>
-->




			<div class="form-group">
				<label class="col-sm-2 control-label">公告状态：</label>
				<div class="col-sm-10">
				    <div class="radio-box" th:each="dict : ${@dict.getType('sys_notice_status')}">
						<input type="radio" th:id="${dict.dictCode}" name="status" th:value="${dict.dictValue}" th:checked="${dict.isDefault == 'Y' ? true : false}">
						<label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
					</div>
				</div>
			</div>
			<input name="fileUpload" hidden="hidden" id="fileUpload">
		</form>
		<!--此处加入文件上传部分的内容	-->
		<form   class="form-horizontal m" enctype="multipart/form-data">
			<label class="col-sm-2 control-label">文件上传：</label>

<!--			<div class="file-loading " >-->
				<!--	加了下面的div会一直转圈圈	-->
				<div class="col-sm-10">
					<input id="fileUploadI" type="file" name="file" multiple data-show-preview="false">
				</div>

<!--			</div>-->
		</form>
	</div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: summernote-js" />


	<script th:src="@{/js/fileinput.min.js}"></script>
	<script th:src="@{/js/piexif.min.js}"></script>
	<script th:src="@{/js/zh.js}"></script>
    <script type="text/javascript">
        var prefix = ctx + "system/notice";

	    $('.summernote').summernote({
	    	placeholder: '请输入公告内容',
			height : 192,
			lang : 'zh-CN',
			callbacks: {
                onImageUpload: function (files) {
                    sendFile(files[0], this);
                }
            }
		});
	    
	    // 上传文件
	    function sendFile(file, obj) {
	        var data = new FormData();
	        data.append("file", file);
	        $.ajax({
	            type: "POST",
	            url: ctx + "common/upload",
	            data: data,
	            cache: false,
	            contentType: false,
	            processData: false,
	            dataType: 'json',
	            success: function(result) {
	                if (result.code == web_status.SUCCESS) {
	                	$(obj).summernote('editor.insertImage', result.url, result.fileName);
					} else {
						$.modal.alertError(result.msg);
					}
	            },
	            error: function(error) {
	                $.modal.alertWarning("图片上传失败。");
	            }
	        });
	    }
		
		$("#form-notice-add").validate({
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	var sHTML = $('.summernote').summernote('code');
				$("#noticeContent").val(sHTML);
				$.operate.save(prefix + "/add", $('#form-notice-add').serialize());
	        }
	    }




/*文件上传	 */
		$(function () {
			$("#fileUploadI").fileinput({

				uploadUrl: '/system/notice/uploadFile', // you must set a valid URL here else you will get an error
				allowedFileExtensions: ['docx','xlsx'],



				overwriteInitial: false,
				maxFileSize: 10000,
				maxFilesNum: 10,
				//allowedFileTypes: ['image', 'video', 'flash'],
				slugCallback: function (filename) {
					return filename.replace('(', '_').replace(']', '_');
				}
			}).on("fileuploaded", function(event, data, previewId, index) {
				console.log(data)
				/*console.log(data)获得图片数据   data就是图片中的数据*/
				$("#fileUpload").val(data.response.fileName)
			});
		})

	</script>
</body>
</html>
