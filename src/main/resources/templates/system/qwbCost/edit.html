<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改費用')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbCost-edit" th:object="${qwbCost}">
            <input id="id" name="id" th:field="*{id}"  type="hidden">
			<div class="form-group">	
				<label class="col-sm-2 control-label">姓名：</label>
				<div class="col-sm-4">
					<input id="name" name="name" th:field="*{name}" class="form-control" type="text">
				</div>

				<!--========================-->
				<label class="col-sm-2 control-label">房间号：</label>
				<div class="col-sm-4">
					<input id="room" name="room" th:field="*{room}" class="form-control" type="text">
				</div>
				<!--========================-->


			</div>


			<div class="form-group">
				<label class="col-sm-2 control-label">发布时间：</label>
				<div class="col-sm-4">
					<input id="createDate" name="createDate" th:field="*{createDate}" class="form-control" type="text">
				</div>
				<label class="col-sm-2 control-label">电费：</label>
				<div class="col-sm-4">
					<input  id="electricityCosts" name="electricityCosts" th:field="*{electricityCosts}" class="form-control" type="text">
				</div>

			</div>

			<div class="form-group">
				<label class="col-sm-2 control-label">水费：</label>
				<div class="col-sm-4">
					<input id="waterCosts" name="waterCosts" th:field="*{waterCosts}" class="form-control" type="text">
				</div>
				<label class="col-sm-2 control-label">燃气费：</label>
				<div class="col-sm-4">
					<input id="gasCosts" name="gasCosts" th:field="*{gasCosts}" class="form-control" type="text">
				</div>

			</div>

			<div class="form-group">
			<label class="col-sm-2 control-label">物业费：</label>
			<div class="col-sm-4">
				<input id="propertyCosts" name="propertyCosts" th:field="*{propertyCosts}" class="form-control" type="text">
			</div>


	<!--============以下框框内自动实现费用总计操作，用于提示交多少钱========================-->
			<label class="col-sm-2 control-label">费用总计：</label>
			<div class="col-sm-4">
				<input id="total" name="total" th:field="*{total}" class="form-control" type="text">
			</div>
		</div>


			<!--<div class="form-group">

				<label class="col-sm-2 control-label">交费时间：</label>
				<div class="col-sm-4">
					<input id="paymentTime" name="paymentTime" th:field="*{paymentTime}" class="form-control" type="text">
				</div>
				<label class="col-sm-2 control-label">扫码支付：</label>
				<div class="col-sm-4">
					<img style="width:100px;height: 100px;" th:src="@{/img/1556198193.png}">
				</div>

			</div>-->



			<div class="form-group">	
				<!--<label class="col-sm-3 control-label">状态：</label>-->
<!--				<div class="col-sm-8">-->
					<!--<input id="state" name="state" th:field="*{state}" class="form-control" type="text">-->
<!--					<input id="state" name="state"   type="text" hidden="hidden" value="1">-->
					<input id="state" name="state"  type="text" hidden="hidden" value="0">
<!--				</div>-->
			</div>
		</form>
    </div>


    <div th:include="include::footer"></div>




    <script type="text/javascript">
		var prefix = ctx + "system/qwbCost";

		//////////////////在单独增加收费时，输入用户名后直接显示出房间号//////////////////////////////
		$('#name').blur(function () {
			var name=$("#name").val();
			$.ajax({
				type : "POST",
				url : prefix + "/room",
				data : {
					"name": name
				},
				async : false,
				error : function(request) {
					$.modal.alertError("系统错误");
				},
				success : function(data) {
					$("#room").val(data)
				}
			});
		});
		////////////////////////////////////////////////



		$("#form-qwbCost-edit").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/edit", $('#form-qwbCost-edit').serialize());
	        }
	    }
	</script>
</body>
</html>
