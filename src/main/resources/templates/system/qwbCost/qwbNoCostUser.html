    <div th:include="include :: footer"></div>
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:qwbCost:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:qwbCost:remove')}]];
        var prefix = ctx + "system/qwbCost";
        var options ={};

            /**
		 * 展示数据
		 */
		$(function() {
             options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
                modalName: "費用",
		        showExport: true,
                columns: [{
		            checkbox: true
		        },
				{
					field : 'id', 
					title : '',
					visible: false
				},
				{
					field : 'name', 
					title : '姓名',
					sortable: true
				},
/////////////////////////////////////////
					{
						field : 'room',
						title : '房间号',
						sortable: true
					},
///////////////////////////////////////
				{
					field : 'createDate', 
					title : '发布时间',
					sortable: true
				},
				{
					field : 'electricityCosts', 
					title : '电费',
					sortable: true
				},
				{
					field : 'waterCosts', 
					title : '水费',
					sortable: true
				},
				{
					field : 'gasCosts', 
					title : '燃气费',
					sortable: true
				},
				{
					field : 'propertyCosts', 
					title : '物业费',
					sortable: true
				},
					{
						field : 'total',
						title : '总计',
						sortable: true
					},

				{
					field : 'paymentTime', 
					title : '缴费时间',
					sortable: true
				},

					{
						// field : 'state',
						title : '状态',
						sortable: true,
						formatter: function(value, row, index) {
							var actions = [];
							if(row.state==0)
							{
								actions.push('未交费');
							}
							else{
								actions.push('已交费');
							}

							return actions.join('');
						}
					},
				/*{
					field : 'state', 
					title : '状态',
					sortable: true
				},*/
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		            	var actions = [];
		            	// actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="#" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>交费</a> ');
		            	actions.push('<a class="btn btn-success btn-xs " href="javascript:void(0);" onclick="CarRent(\'/system/qwbCost/edit/' + row.id + '\',\'交费\');"><i class="fa fa-edit"></i>交费</a> ');
                        /*actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="#" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');*/
						return actions.join('');
		            }
		        }]
            };

/////////初始化+搜索/////////////////////////////////////
            $.table.init(options);
			$.table.search();
        });
		//跳转
		function CarRent(dictId, name) {
			createMenuItem(dictId, name);
		}

////////////下面的是页面的自动刷新/////////////////////////////
		$(function () {
            setInterval("refresh()",3000);
        })
        function  refresh() {

            $("#bootstrap-table").bootstrapTable('refresh');
            console.log("aa")
        }
 /////////////////////////////////////////
    </script>
