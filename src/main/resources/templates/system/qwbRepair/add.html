    <script type="text/javascript">
		var prefix = ctx + "system/qwbRepair"
		$("#form-qwbRepair-add").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
/*下面的这个	function	submitHandler()才是将数据存入到数据库中*/
		function submitHandler() {
	        if ($.validate.form('form-qwbRepair-add')) {
	            $.operate.save(prefix + "/add", $('#form-qwbRepair-add').serialize());
	        }
	    }

	    $(function () {
			$("#fileUploadI").fileinput({

				uploadUrl: '/system/qwbRepair/upload', // you must set a valid URL here else you will get an error
				allowedFileExtensions: ['jpg', 'png', 'gif'],
				overwriteInitial: false,
				maxFileSize: 10000,
				maxFilesNum: 10,
				//allowedFileTypes: ['image', 'video', 'flash'],
				slugCallback: function (filename) {
					return filename.replace('(', '_').replace(']', '_');
				}
			}).on("fileuploaded", function(event, data, previewId, index) {
				console.log(data)

				/*console.log(data)获得图片数据   data就是图片中的数据*/

				$("#repairPicture").val(data.response.fileName)
			});
		})

	</script>
