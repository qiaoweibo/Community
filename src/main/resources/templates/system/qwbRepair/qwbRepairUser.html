<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('維修列表')" />

<!---===用户视图的维修操作========================-->
<body class="gray-bg">
     <div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="formId">
					<div class="select-list">
						<ul>
<li>如果报修处理不及时，请联系王师傅(电话：13677860590)</li>
							<li>
								<input hidden type="text" name="name"  th:value="${session.user.userName}"/>
							</li>

							<!--<li>
								住户姓名：<input hidden type="text" name="name" th:value="${session.user.userName}" />
							</li>


							<li>
								房间号：<input type="text" name="room"/>
							</li>


							<li>
								发布时间：<input type="text" name="creationTime"/>
							</li>

							<li>
								维修内容：<input type="text" name="content"/>
							</li>



							<li>
								维修结果：<input type="text" name="remarks"/>
							</li>

							<li>
								完成时间：<input type="text" name="completeTime"/>
							</li>

							<li>
								&lt;!&ndash;状态:0.未完成，1，完成。2.无法完成：<input type="text" name="state"/>&ndash;&gt;
								状态：<input type="text" name="state"/>
							</li>

							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>-->
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:qwbRepair:add">
					<i class="fa fa-plus"></i> 报修
				</a>
				<a class="btn btn-primary btn-edit disabled" onclick="$.operate.edit()" shiro:hasPermission="system:qwbRepair:edit">
					<i class="fa fa-edit"></i> 修改报修内容
				</a>
				<a class="btn btn-danger btn-del btn-del disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:qwbRepair:remove">
					<i class="fa fa-remove"></i> 撤回报修
				</a>
				<a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:qwbRepair:export">
						<i class="fa fa-download"></i> 导出
				 </a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table" data-mobile-responsive="true"></table>
			</div>


			<!-- 模态框（Modal） -->
			<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
				<div class="modal-dialog">
					<div class="modal-content">
						<img id="showImg" style="width:100%;" src=" ">
					</div><!-- /.modal-content -->
				</div><!-- /.modal -->
			</div>


		</div>
	</div>
    <div th:include="include :: footer"></div>
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:qwbRepair:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:qwbRepair:remove')}]];
        var prefix = ctx + "system/qwbRepair";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
                modalName: "維修",
		        showExport: true,
                columns: [{
		            checkbox: true
		        },
				{
					field : 'id', 
					title : '',
					visible: false
				},
				{
					field : 'name', 
					title : '住户姓名',
					sortable: true
				},
/////////////////////////////////////////
					{
						field : 'room',
						title : '房间号',
						sortable: true
					},


//////////////////////////////////////////////
				{
					field : 'creationTime', 
					title : '发布时间',
					sortable: true
				},
				{
					field : 'content', 
					title : '维修内容',
					sortable: true
				},

					{
						// field : 'repairPicture',
						title : '报修图片',
						formatter: function(value, row, index) {
							var actions = [];
							actions.push('<img style="width:50px;height: auto;" href="#" src="' + row.repairPicture + '" onclick="openBig(\'' + row.repairPicture + '\')"></img> ');

							return actions.join('');
						}

					},

					{
						field : 'repairName',
						title : '维修人',
						sortable: true
					},
					{
						field : 'repairPhone',
						title : '维修电话',
						sortable: true
					},
				{
					field : 'remarks', 
					title : '维修结果',
					sortable: true
				},

					{
						field : 'completeTime',
						title : '完成时间',
						sortable: true
					},

					{
						// field : 'state',
						title : '状态',
						sortable: true,
						formatter: function(value, row, index) {
							var actions = [];
							if(row.state==0)
							{
								actions.push('未处理');
							}
							else{
								actions.push('已处理');
							}

							return actions.join('');
						}
					},

				/*{
					field : 'state', 
					/!*title : '状态:0.未完成，1，完成。2.无法完成',*!/
					title : '状态',
					sortable: true
				},*/
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		            	var actions = [];
						if(row.state==0)
						{
							actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="#" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
						}
/*
		            	actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="#" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
*/
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="#" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
						return actions.join('');
		            }
		        }]
            };
            $.table.init(options);

/////////初始化+搜索/////////////////////////////////////
			$.table.search();
        });
		function openBig(imgurl) {
			$("#showImg").attr("src",imgurl);

			$('#myModal').modal('show')
		}
    </script>
</body>
</html>
