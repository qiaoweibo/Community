<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改維修')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbRepair-edit" th:object="${qwbRepair}">
            <input id="id" name="id" th:field="*{id}"  type="hidden">
			<div class="form-group">	
				<label class="col-sm-3 control-label">住户姓名：</label>
				<div class="col-sm-8">
					<input  readonly id="name" name="name" th:field="*{name}" class="form-control" type="text">
				</div>
			</div>


			<div class="form-group">
				<label class="col-sm-3 control-label">房间号：</label>
				<div class="col-sm-8">
					<input  readonly id="room" name="room" th:field="*{room}" class="form-control" type="text">
				</div>
			</div>


			<div class="form-group">	
				<label class="col-sm-3 control-label">发布时间：</label>
				<div class="col-sm-8">
					<input  readonly id="creationTime" name="creationTime" th:field="*{creationTime}" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">维修内容：</label>
				<div class="col-sm-8">
					<input  readonly id="content" name="content" th:field="*{content}" class="form-control" type="text">
				</div>
			</div>

<!--添加需要报修的图片-->
			<div class="form-group">
				<label class="col-sm-3 control-label">上传图片：</label>
				<div class="col-sm-8">
					<input  readonly id="repairPicture" name="repairPicture" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">维修人：</label>
				<div class="col-sm-8">
					<input id="repairName" name="repairName" th:field="*{repairName}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">维修人电话：</label>
				<div class="col-sm-8">
					<input id="repairPhone" name="repairPhone" th:field="*{repairPhone}" class="form-control" type="text">
				</div>
			</div>

			<div class="form-group">
				<label class="col-sm-3 control-label">维修结果：</label>
				<div class="col-sm-8">
					<input id="remarks" name="remarks" th:field="*{remarks}" class="form-control" type="text">
				</div>
			</div>


<!--
			<div class="form-group">
				<label class="col-sm-3 control-label">完成时间：</label>
				<div class="col-sm-8">
					<input id="completeTime" name="completeTime" th:field="*{completeTime}" class="form-control" type="text">
				</div>
			</div>-->

			<input id="state" name="state"  type="text" hidden="hidden" value="1">

			<!--<div class="form-group">
				<label class="col-sm-3 control-label">状态:0.未完成，1，完成。2.无法完成：</label>
				<div class="col-sm-8">
					<input id="state" name="state" th:field="*{state}" class="form-control" type="text">
				</div>
			</div>-->
		</form>
    </div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbRepair";
		$("#form-qwbRepair-edit").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/edit", $('#form-qwbRepair-edit').serialize());
	        }
	    }
	</script>
</body>
</html>
