<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('租房列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="formId">
					<div class="select-list">
						<ul>

							<li>
								<input hidden type="text" name="name"  th:value="${session.user.userName}"/>
							</li>
							<!--<li>
								发布人姓名：<input type="text" name="name"/>
							</li>

							<li>
								租房信息：<input type="text" name="content"/>
							</li>

							<li>
								发布时间：<input type="text" name="time"/>
							</li>

							<li>
								备注：<input type="text" name="remark"/>
							</li>

							<li>
								发布人的电话：<input type="text" name="phone"/>
							</li>

							<li>
								发布人的邮箱：<input type="text" name="email"/>
							</li>

							<li>
								户型(3室1厅1厨1卫：120平）：<input type="text" name="roomType"/>
							</li>

							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>-->
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
				<a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:qwbHouseRent:add">
					<i class="fa fa-plus"></i> 发布租房通知
				</a>
				<a class="btn btn-primary btn-edit disabled" onclick="$.operate.edit()" shiro:hasPermission="system:qwbHouseRent:edit">
					<i class="fa fa-edit"></i> 修改租房通知
				</a>
				<a class="btn btn-danger btn-del btn-del disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:qwbHouseRent:remove">
					<i class="fa fa-remove"></i> 删除
				</a>
				<a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:qwbHouseRent:export">
						<i class="fa fa-download"></i> 导出
				 </a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table" data-mobile-responsive="true"></table>
			</div>
		</div>
	</div>
    <div th:include="include :: footer"></div>
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:qwbHouseRent:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:qwbHouseRent:remove')}]];
        var prefix = ctx + "system/qwbHouseRent";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
                modalName: "租房",
		        showExport: true,
                columns: [{
		            checkbox: true
		        },
				{
					field : 'id', 
					title : '',
					visible: false
				},
				{
					field : 'name', 
					title : '发布人姓名',
					sortable: true
				},
				{
					field : 'content', 
					title : '租房信息',
					sortable: true
				},
				{
					field : 'time', 
					title : '发布时间',
					sortable: true
				},
				{
					field : 'remark', 
					title : '备注',
					visible: false
				},
				{
					field : 'phone', 
					title : '电话',
					sortable: true
				},
				{
					field : 'email', 
					title : '邮箱',
					sortable: true
				},
				{
					field : 'roomType', 
					title : '户型',
					sortable: true
				},
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row, index) {
		            	var actions = [];
		            	actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="#" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>修改</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="#" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
						return actions.join('');
		            }
		        }]
            };
            $.table.init(options);

			$.table.search();
        });
    </script>
</body>
</html>
