<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增租房')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-qwbHouseRent-add">
			<div class="form-group">	
				<label class="col-sm-3 control-label">姓名：</label>
				<div class="col-sm-8">
					<input id="name" name="name" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">租房信息：</label>
				<div class="col-sm-8">
					<input id="content" name="content" class="form-control" type="text">
				</div>
			</div>
			<!--<div class="form-group">
				<label class="col-sm-3 control-label">发布时间：</label>
				<div class="col-sm-8">
					<input id="time" name="time" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">备注：</label>
				<div class="col-sm-8">
					<input id="remark" name="remark" class="form-control" type="text">
				</div>
			</div>-->
			<div class="form-group">	
				<label class="col-sm-3 control-label">电话：</label>
				<div class="col-sm-8">
					<input id="phone" name="phone" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">	
				<label class="col-sm-3 control-label">邮箱：</label>
				<div class="col-sm-8">
					<input id="email" name="email" class="form-control" type="text">
				</div>
			</div>
			<div class="form-group">

				<div class="form-group">
					<label class="col-sm-3 control-label">户型：</label>
					<div class="col-sm-4">
						<select class="input-sm form-control input-s-sm inline" name="roomType">
							<option value="1室1厅1厨1卫">1室1厅1厨1卫</option>
							<option value="2室1厅1厨1卫">2室1厅1厨1卫</option>
							<option value="3室1厅1厨1卫">3室1厅1厨1卫</option>
						</select>
					</div>
				</div>

				<!--<label class="col-sm-3 control-label">户型(加一个下拉选项框)：</label>
				<div class="col-sm-8">
					<input id="roomType" name="roomType" class="form-control" type="text">
				</div>-->
			</div>
		</form>
	</div>
    <div th:include="include::footer"></div>
    <script type="text/javascript">
		var prefix = ctx + "system/qwbHouseRent"
		$("#form-qwbHouseRent-add").validate({
			rules:{
				xxxx:{
					required:true,
				},
			},
			focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	            $.operate.save(prefix + "/add", $('#form-qwbHouseRent-add').serialize());
	        }
	    }
	</script>
</body>
</html>
